<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro Inteligente PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
/* =========================
   ESTILOS BASE
========================= */
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
body{ background: linear-gradient(135deg,#4e73df,#1cc88a); min-height:100vh; display:flex; justify-content:center; align-items:center; padding: 20px; transition: 0.3s;}
.container{ background:white; width:100%; max-width: 950px; padding:30px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.2); transition: 0.3s;}
h1{ text-align:center; margin-bottom:20px; color:#4e73df; }
.form{ display:flex; gap:10px; margin-bottom:20px; flex-wrap: wrap;}
input{ padding:10px; border-radius:8px; border:1px solid #ccc; flex:1; min-width: 150px;}
button{ padding:10px 15px; border:none; border-radius:8px; background:#4e73df; color:white; cursor:pointer; transition:0.3s; font-weight: 500;}
button:hover{ background:#2e59d9; }
.video-area{ text-align:center; margin:20px 0; }
video{ border-radius:10px; border:3px solid #4e73df; }
.drag-area{ border:2px dashed #1cc88a; border-radius:10px; padding:20px; text-align:center; margin-top:20px; }
.cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:15px; margin-top:20px; }
.card{ background:#f8f9fc; padding:15px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); text-align:center; transition:0.3s; display: flex; flex-direction: column; gap: 5px;}
.card img{ width:100px; height:100px; border-radius:50%; object-fit:cover; margin: 0 auto 10px; }

/* =========================
   ESTILOS PRO (CONTROLES E TEMA)
========================= */
.controles { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; background: #f1f3f9; padding: 15px; border-radius: 10px;}
.btn-danger { background: #e74a3b; }
.btn-danger:hover { background: #be2617; }
.btn-warning { background: #f6c23e; color: #333;}
.btn-warning:hover { background: #dfa821; }
.contador { font-weight: bold; color: #555; margin-bottom: 10px;}

/* CSS do Tema Dark */
body.dark-theme { background: linear-gradient(135deg, #1a1a2e, #16213e); }
body.dark-theme .container { background: #0f3460; color: #fff; }
body.dark-theme h1 { color: #1cc88a; }
body.dark-theme .controles { background: #1a1a2e; }
body.dark-theme .card { background: #1a1a2e; color: #fff; }
body.dark-theme .contador { color: #ccc; }
</style>
</head>
<body>

<div class="container">
  <h1>Cadastro Inteligente</h1>

  <div class="form">
    <input type="text" id="nome" placeholder="Nome do usuário">
    <input type="number" id="idade" placeholder="Idade">
    <button id="btnSalvar" onclick="cadastrar()">Salvar Cadastro</button>
  </div>

  <div class="controles">
    <input type="text" id="filtroNome" placeholder="Buscar por nome..." onkeyup="filtrarPorNome()">
    <button onclick="ordenarPorIdade()">Ordenar por Idade</button>
    <button class="btn-danger" onclick="limparTodos()">Limpar Todos</button>
    <button onclick="alternarTema()">Tema Dark/Light</button>
  </div>

  <p class="contador" id="contadorUsuarios">Total de cadastrados: 0</p>

  <div class="video-area">
    <video id="video" width="250" autoplay></video><br><br>
    <button onclick="ativarCamera()">Ativar Câmera</button>
    <button onclick="capturarFoto()">Capturar Foto</button>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>
 
  <div class="drag-area" id="dragArea">Arraste a foto capturada aqui (ou capture pelo botão)</div>

  <h2 style="margin-top:20px;">Usuários Cadastrados</h2>
  <div class="cards" id="listaUsuarios"></div>
</div>

<script src="script.js"></script>
</body>
</html>
